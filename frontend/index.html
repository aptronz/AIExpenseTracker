<!DOCTYPE html>
<html>
<head>
  <title>AI Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo"><h2>💰 AI Expense Tracker</h2></div>
  <div>
    <span class="user">JohnDoe</span>
    <button class="logout">Logout</button>
  </div>
</div>

<!-- DASHBOARD CARDS -->
<div class="cards">
  <div class="card income">
    <h3>Total Income</h3>
    <p id="totalIncome">Rs 0</p>
  </div>

  <div class="card expense">
    <h3>Total Expenses</h3>
    <p id="totalExpense">Rs 0</p>
  </div>

  <div class="card fixed">
    <h3>Fixed Expenses</h3>
    <p id="fixedExpense">Rs 0</p>
  </div>

  <div class="card balance">
    <h3>Balance</h3>
    <p id="balance">Rs 0</p>
  </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <button onclick="addIncome()">💰 Add Income</button>
  <button class="red" onclick="addExpense()">💸 Add Expense</button>
  <button class="yellow" onclick="addFixedExpense()">📌 Fixed Expense</button>
</div>


<!-- HISTORY -->
<div class="history">
  <h2>📊 Transaction History</h2>
  <ul id="historyList"></ul>
</div>


<script src="script.js"></script>
</body>
</html>
